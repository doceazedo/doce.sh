name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Write build env file
        env:
          DOTENV: ${{ secrets.DOTENV }}
        run: |
          printf '%s' "$DOTENV" > "${RUNNER_TEMP}/dotenv"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            doceazedo/doce.sh:${{ github.sha }}
            doceazedo/doce.sh:latest
          secret-files: |
            env=${{ runner.temp }}/dotenv
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update container image on Magic Containers
        uses: BunnyWay/actions/container-update-image@main
        with:
          app_id: ${{ vars.BUNNY_APP_ID }}
          api_key: ${{ secrets.BUNNYNET_API_KEY }}
          container: docesh
          image_tag: ${{ github.sha }}
          image_digest: ${{ steps.build.outputs.digest }}
